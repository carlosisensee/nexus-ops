[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Variáveis de ambiente (Netlify Dashboard → Site Settings → Environment Variables) ──
#
#   ANTHROPIC_API_KEY       → Chave da Anthropic (Claude Haiku)
#   SUPABASE_URL            → URL do projeto Supabase (ex: https://xyzxyz.supabase.co)
#   SUPABASE_SERVICE_KEY    → service_role key do Supabase (NUNCA expor no frontend)
#   NEXUS_ALLOWED_ORIGIN    → URL do site em produção (ex: https://nexus-ops-hub.netlify.app)
#   NEXUS_SEED_SECRET       → Senha avulsa para o endpoint ig-seed (pode remover após o seed)
#
#   Temporárias (podem ser removidas após executar ig-seed):
#   IG_ACCESS_TOKEN         → Token long-lived Instagram (migrado para o Supabase via ig-seed)
#   IG_ACCOUNT_ID           → Account ID Instagram (migrado para o Supabase via ig-seed)

# ── Scheduled Functions (Netlify) ────────────────────────────────────────────
# Requer Netlify Pro ou superior. No plano gratuito, use o Supabase pg_cron
# ou ative manualmente via dashboard.

[functions."ig-token-refresh"]
  schedule = "0 9 * * 1"
  # Toda segunda-feira às 09h — verifica e renova token Instagram se < 7 dias

[functions."ig-daily-snapshot"]
  schedule = "0 23 * * *"
  # Todo dia às 23h — garante que o snapshot diário seja salvo no Supabase

# ── Security Headers (OWASP A05 — Security Misconfiguration) ────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://ajax.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://ajax.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    X-Powered-By = ""
